name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, build, and test
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Show Swift version
        run: swift --version
      - name: Check formatting and documentation
        run: swift format lint --configuration .swift-format --strict --recursive Package.swift Sources Tests Apps
      - name: Build release artifacts
        run: swift build -c release
      - name: Run tests
        run: swift test --parallel
